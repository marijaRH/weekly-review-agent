# Weekly: find "AI office hours" calendar meetings and copy any new recording/transcript
# attachments to the target Drive folder. Add repo secret GCP_SA_KEY (full service
# account JSON). Share your Google Calendar and the target Drive folder with the SA email.

name: AI Office Hours — Transcripts Sync

on:
  schedule:
    # Mondays 08:00 UTC (9 AM CET / 10 AM CEST)
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          if [ -f config/scripts/requirements-ai-office-hours-sync.txt ]; then cd config; fi
          pip install -r scripts/requirements-ai-office-hours-sync.txt

      - name: Run AI office hours transcript sync
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          AI_OFFICE_HOURS_CALENDAR_ID: ${{ vars.AI_OFFICE_HOURS_CALENDAR_ID || 'primary' }}
          AI_OFFICE_HOURS_TARGET_FOLDER_ID: ${{ vars.AI_OFFICE_HOURS_TARGET_FOLDER_ID || '1qWWkHcqefAS5RVCCUazcEjsRHesWfVo2' }}
        run: |
          if [ -f config/scripts/ai_office_hours_transcripts_sync.py ]; then cd config; fi
          python scripts/ai_office_hours_transcripts_sync.py

      - name: Persist copied log
        run: |
          if [ -f config/scripts/.ai-office-hours-copied.log ]; then cd config; fi
          if [ -f scripts/.ai-office-hours-copied.log ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add scripts/.ai-office-hours-copied.log
            git diff --staged --quiet || git commit -m "chore: update AI office hours sync log"
            git push
          fi
        permissions:
          contents: write
